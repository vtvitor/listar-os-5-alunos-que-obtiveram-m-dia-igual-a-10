<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineManager - Notas 🎓</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark shadow-sm mb-5">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🏫 Escola <span class="badge bg-primary">NOTAS</span></span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            
            <div class="col-lg-5">
                <div class="card card-custom shadow">
                    <div class="card-header header-custom py-3">
                        <h5 class="mb-0 text-center text-white">Cadastro de Aluno</h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome do Aluno</label>
                            <input type="text" id="Nome" class="form-control" placeholder="Ex: Maria Silva">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label fw-bold">Nota 1</label>
                                <input type="number" id="nota1" class="form-control" placeholder="0.0">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label fw-bold">Nota 2</label>
                                <input type="number" id="nota2" class="form-control" placeholder="0.0">
                            </div>
                        </div>
                        <button id="btnCadastrar" class="btn btn-primary w-100 btn-lg mt-2">
                            Salvar Nota
                        </button>
                    </div>
                </div>
            </div>

            

            <div class="col-lg-7">
                <div class="card card-custom shadow">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0">📝 Histórico de Notas</h5>
                    </div>
                    <div class="card-body p-4">
                        <div id="media">
                            <p class="text-muted text-center">🧑‍🎓Nenhum aluno na lista.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-12 mt-4">
                <div class="card card-custom shadow border-warning">
                    <div class="card-header bg-warning text-dark py-3">
                        <h5 class="mb-0 text-center">⭐ Quadro de Honra: Alunos Nota 10</h5>
                    </div>
                    <div class="card-body p-4">
                        <div id="top5" class="row row-cols-1 row-cols-md-5 g-3">
                            <p class="text-muted text-center w-100">Nenhum aluno com nota máxima ainda.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="cadastro.js"></script>
</body>
</html>
